#============================================================================================
# https://github.com/kun4399/fork-openwrt
# Description: Build ImmortalWrt for NORCO EMB-3531 (RK3399)
# Uses retro98boy's ImmortalWrt fork with native EMB 3531 DTS/U-Boot/kernel support
#============================================================================================

name: Build ImmortalWrt for EMB-3531

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      openwrt_ip:
        description: "Set default LAN IP address"
        required: false
        default: "192.168.1.1"
      use_ccache:
        description: "Use ccache for faster rebuilds"
        required: false
        default: true
        type: boolean
      openwrt_storage:
        description: "Select image storage type"
        required: false
        default: "save"
        type: choice
        options:
          - save
          - temp
      builder_name:
        description: "Set builder signature"
        required: false
        default: "kun4399"

env:
  TZ: Etc/UTC
  CCACHE_DIR: /builder/openwrt/.ccache
  SOURCE_REPO: https://github.com/retro98boy/openwrt
  SOURCE_BRANCH: main

jobs:
  build:
    runs-on: ubuntu-24.04
    if: ${{ github.event.repository.owner.id == github.event.sender.id }}
    permissions:
      contents: write

    name: build-emb3531-immortalwrt

    steps:
      - name: Checkout build scripts
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Initialize the build environment
        id: init
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          docker rmi -f $(docker images -q) 2>/dev/null || true
          [[ -n "${AGENT_TOOLSDIRECTORY}" ]] && sudo rm -rf "${AGENT_TOOLSDIRECTORY}"
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android 2>/dev/null
          sudo swapoff -a
          sudo rm -f /swapfile /mnt/swapfile
          sudo -E apt-get -y update
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y install $(curl -fsSL https://ophub.org/ubuntu2404-make-openwrt-depends)
          sudo -E systemctl daemon-reload
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get clean
          sudo sed -i '/NVM_DIR/d;/skel/d' /root/{.bashrc,.profile}
          sudo rm -rf ~/{.cargo,.dotnet,.rustup}
          sudo -E timedatectl set-timezone "${TZ:-Etc/UTC}"
          sudo -E ntpdate ntp.ubuntu.com 0.pool.ntp.org || true
          sudo -E timedatectl set-ntp true
          date -u
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Create virtual disk for extended storage
        id: disk
        run: |
          root_avail=$(df --block-size=1G / | tail -1 | awk '{print $4}')
          root_size=$(( root_avail - 4 ))
          [[ "${root_size}" -gt 0 ]] || { echo "Error: Insufficient space on /: ${root_avail}G available"; exit 1; }

          sudo truncate -s "${root_size}"G /root.img
          build_dev=$(sudo losetup --find --show /root.img)

          sudo mkfs.xfs -f -i sparse=0 -b size=4096 "${build_dev}"
          sudo mkdir -p /builder
          sudo mount "${build_dev}" /builder
          sudo chown -R runner:runner /builder
          df -Th
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Clone source code
        id: codes
        working-directory: /builder
        if: ${{ steps.init.outputs.status == 'success' && !cancelled() }}
        run: |
          git clone -q --single-branch --depth=1 --branch=${SOURCE_BRANCH} ${SOURCE_REPO} openwrt
          ln -sf /builder/openwrt ${{ github.workspace }}/openwrt

          echo "build_tag=ImmortalWrt_emb3531_${{ inputs.openwrt_storage }}_$(date +"%Y.%m")" >> ${GITHUB_ENV}
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Load custom feeds and configuration
        id: config
        working-directory: /builder/openwrt
        run: |
          # Copy custom feeds config
          [[ -f "${{ github.workspace }}/config/emb3531_immortalwrt/feeds.conf.default" ]] && \
            cp -f ${{ github.workspace }}/config/emb3531_immortalwrt/feeds.conf.default feeds.conf.default

          # Run pre-feeds customization
          chmod +x ${{ github.workspace }}/config/emb3531_immortalwrt/diy-part1.sh
          ${{ github.workspace }}/config/emb3531_immortalwrt/diy-part1.sh

          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Update and install feeds
        working-directory: /builder/openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load custom configuration
        working-directory: /builder/openwrt
        run: |
          # Copy base config
          cp -f ${{ github.workspace }}/config/emb3531_immortalwrt/config .config

          # Run post-feeds customization
          chmod +x ${{ github.workspace }}/config/emb3531_immortalwrt/diy-part2.sh
          ${{ github.workspace }}/config/emb3531_immortalwrt/diy-part2.sh "${{ inputs.openwrt_ip }}" "${{ inputs.use_ccache }}"

          # Expand config to include all defaults
          make defconfig

      - name: Download packages
        id: package
        working-directory: /builder/openwrt
        run: |
          make download -j8
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Get source commit hash for cache key
        id: openwrthash
        run: |
          source_hash=$(curl -fsSL -m 20 \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/retro98boy/openwrt/git/ref/heads/main" |
              jq -r '.object.sha'
          )
          [[ -z "${source_hash}" || "${source_hash}" == "null" ]] && source_hash="${{ github.sha }}"
          echo "source_hash=${source_hash}" >> ${GITHUB_ENV}
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: /builder/openwrt/.ccache
          key: emb3531-immortalwrt-${{ env.source_hash }}
          restore-keys: |
            emb3531-immortalwrt-

      - name: Compile the ImmortalWrt firmware
        id: compile
        working-directory: /builder/openwrt
        run: |
          echo "Compiling with $(nproc) threads for EMB-3531 (Rockchip RK3399)"
          make -j$(($(nproc) + 1)) V=s || make -j1 || make -j1 V=s

          echo "ccache statistics:"
          ccache -s 2>/dev/null || true
          echo "ccache directory size:"
          du -sh .ccache 2>/dev/null || true

          # Show build results
          echo "Build artifacts:"
          find bin/targets/rockchip/armv8/ -type f -name "*norco_emb-3531*" -ls || true
          find bin/targets/rockchip/armv8/ -type f \( -name "*.img.gz" -o -name "*.img" -o -name "*rootfs*" \) -ls || true

          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Organize build artifacts
        id: organize
        if: ${{ steps.compile.outputs.status == 'success' && !cancelled() }}
        working-directory: /builder/openwrt
        run: |
          mkdir -p output
          # Copy EMB-3531 specific images
          find bin/targets/rockchip/armv8/ -type f -name "*norco_emb-3531*" -exec cp -v {} output/ \;
          # Also copy generic rockchip armv8 images (sysupgrade, factory, etc.)
          find bin/targets/rockchip/armv8/ -type f \( -name "*.img.gz" -o -name "*.img" \) -exec cp -v {} output/ \;
          # Copy rootfs
          find bin/targets/rockchip/armv8/ -type f -name "*rootfs*" -exec cp -v {} output/ \;
          # Save config for reference
          cp -f .config output/config-emb3531
          echo "Build artifacts in output/:"
          ls -la output/
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Upload ImmortalWrt images to Release
        uses: ophub/upload-to-releases@main
        if: ${{ steps.organize.outputs.status == 'success' && !cancelled() }}
        with:
          tag: ${{ env.build_tag }}
          artifacts: /builder/openwrt/output/*
          allow_updates: true
          remove_artifacts: false
          replaces_artifacts: true
          make_latest: true
          gh_token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ### ImmortalWrt for NORCO EMB-3531
            - **Device**: NORCO EMB-3531 (Rockchip RK3399)
            - **Default IP**: `${{ inputs.openwrt_ip }}`
            - **Default username**: `root`
            - **Default password**: `password`

            ### Hardware Specs
            - SoC: Rockchip RK3399 (Dual Cortex-A72 + Quad Cortex-A53)
            - RAM: 2GB DDR3
            - Storage: 32GB eMMC + SD card slot
            - Ethernet: 1x Gigabit (RTL8211F)
            - USB: 2x USB3 + 2x USB2 + Type-C
            - Display: HDMI + DisplayPort
            - Audio: ES8316 codec (headphone/speaker/SPDIF)

            ### Installation
            1. Write the `.img.gz` file to SD card or eMMC using `dd` or balenaEtcher
            2. Insert SD card / power on device
            3. Access LuCI at http://${{ inputs.openwrt_ip }}

            ### Source
            - Build scripts: [kun4399/fork-openwrt](https://github.com/kun4399/fork-openwrt)
            - ImmortalWrt source: [retro98boy/openwrt](https://github.com/retro98boy/openwrt)
            - Kernel: 6.18 (Rockchip-optimized)

            🤖 Generated with [Claude Code](https://claude.com/claude-code)
            via [Happy](https://happy.engineering)

            Co-Authored-By: Claude <noreply@anthropic.com>
            Co-Authored-By: Happy <yesreply@happy.engineering>
